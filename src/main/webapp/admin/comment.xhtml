<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<head>
   <link rel="icon" type="image/svg+xml" href="/resources/images/favicon.svg"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css"/>
</head>
<f:view>
    <h:panelGroup layout="block" styleClass="admin-main">
        <h1>Kommentarer</h1>
        <h2>Genomsnittligt betyg: <h:outputText value="#{CommentsBean.averageRating}"><f:convertNumber maxFractionDigits="2"/></h:outputText>/5</h2>
        <div class="review-list">
            <h:form>
                <ui:repeat value="#{CommentsBean.holdAllReviews}" var="item">
                    <div class="review-item">
                        <div class="review-item-header">
                            <span class="review-item-name"><h:outputText value="#{item.firstName}"/></span>
                            <span class="review-item-rating">
                                <h:outputText value="★★★★★" rendered="#{item.ranking == 5}"/>
                                <h:outputText value="★★★★☆" rendered="#{item.ranking == 4}"/>
                                <h:outputText value="★★★☆☆" rendered="#{item.ranking == 3}"/>
                                <h:outputText value="★★☆☆☆" rendered="#{item.ranking == 2}"/>
                                <h:outputText value="★☆☆☆☆" rendered="#{item.ranking == 1}"/>
                            </span>
                            <h:commandButton styleClass="remove-btn" title="Ta bort" value="✖"
                                             actionListener="#{CommentsBean.removeComment(item.id)}"/>
                        </div>
                        <p class="review-item-text"><h:outputText value="#{item.text}"/></p>
                    </div>
                </ui:repeat>
            </h:form>
        </div>
    </h:panelGroup>
</f:view>
</html>
