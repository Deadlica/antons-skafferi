<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      lang="sv"
      xml:lang="sv">
<h:head>
   <link rel="icon" type="image/svg+xml" href="/resources/images/favicon.svg"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <h:outputStylesheet library="css" name="styles.css"/>
    <h:outputStylesheet library="css" name="adminEvent.css"/>
    <h:outputStylesheet library="css" name="event.css"/>
    <h:outputScript library="js" name="admin.js"/>
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css"/>
</h:head>

<h:body>
    <f:view>
        <ui:include src="nav.xhtml"/>
        <h:panelGroup layout="block" styleClass="admin-main">
            <!-- ADD EVENT -->
            <h:form class="event-add" enctype="multipart/form-data">
                <h1 class="admin-event-title">Lägg till event</h1>
                <h:outputLabel>Titel</h:outputLabel>
                <h:inputText id="given-event-name" value="#{EventBean.eventItem.NAME}"/>
                <h:outputLabel>Pris</h:outputLabel>
                <h:inputText id="given-event-price" value="#{EventBean.eventItem.PRICE}"/>
                <h:outputLabel>Beskrivning</h:outputLabel>
                <h:inputTextarea id="given-event-description" value="#{EventBean.eventItem.DESCRIPTION}"/>
                <h:outputLabel>Datum</h:outputLabel>
                <h:inputText id="given-event-date" value="#{EventBean.eventItem.date}">
                    <f:passThroughAttribute name="type" value="date"/>
                </h:inputText>
                <h:outputLabel>Bild</h:outputLabel>
                <h:inputFile id="given-event-image" value="#{EventBean.image}"/>
                <h:commandButton value="Lägg till" action="#{EventBean.addNewEvent()}" class="admin-event-add-button"/>
            </h:form>

            <div class="all-event">
                <h:form id="events-form">
                    <ui:repeat value="#{EventBean.allEvents}" var="item" varStatus="status">
                        <div class="event-all-components">
                            <div class="event-information">
                                <h2 class="event-name"><h:outputText value="#{item.NAME}"/></h2>
                                <p class="event-meta"><h:outputText value="#{item.date}"/> · <h:outputText value="#{item.PRICE}"/> :-</p>
                                <p class="event-desc"><h:outputText value="#{item.DESCRIPTION}"/></p>
                            </div>
                            <h:commandButton class="event-remove-button" value="Ta bort"
                                             action="#{EventBean.removeEvent(item.id)}">
                                <f:ajax execute="@form" render="events-form"/>
                            </h:commandButton>
                        </div>
                    </ui:repeat>
                </h:form>
            </div>
        </h:panelGroup>
        <ui:include src="footer.xhtml"/>
    </f:view>
</h:body>
</html>
